version: '3.8'

networks:
  grievance-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:
  mongodb:
    image: mongo:7
    container_name: grievance-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: grievance_db
    volumes:
      - mongo-data:/data/db
    networks:
      - grievance-net

  redis:
    image: redis:7
    container_name: grievance-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - grievance-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grievance-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/grievance_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: grievance_jwt_secret_key_2026_secure
      JWT_EXPIRES_IN: 7d
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: llama3
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - grievance-net

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: grievance-worker
    restart: always
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/grievance_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: grievance_jwt_secret_key_2026_secure
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: llama3
    depends_on:
      - mongodb
      - redis
    networks:
      - grievance-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grievance-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - grievance-net
